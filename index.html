<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SBSL Tag App</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.6/JsBarcode.all.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Barlow+Condensed:ital,wght@1,800;1,900&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      color: #111;
    }

    /* ── Header ── */
    header {
      background: #000;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-title {
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .header-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.25);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ── Tabs ── */
    .tabs {
      background: #111;
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .tab-btn {
      flex: 1;
      padding: 14px 6px 12px;
      color: rgba(255,255,255,0.3);
      border: none;
      background: none;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      white-space: nowrap;
      transition: color 0.2s;
      border-bottom: 2px solid transparent;
      font-family: inherit;
    }
    .tab-btn .icon { display: block; font-size: 17px; margin-bottom: 3px; }
    .tab-btn.active {
      color: #fff;
      border-bottom-color: #fff;
    }

    /* ── Layout ── */
    .content {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px 100px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-title {
      font-size: 22px;
      font-weight: 900;
      color: #000;
      margin-bottom: 18px;
      letter-spacing: -0.5px;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
      border: 1px solid #e8e8e8;
    }
    .card-title {
      font-size: 10px;
      font-weight: 800;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    /* ── Form ── */
    label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    input[type="text"],
    input[type="number"],
    input[type="search"] {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      color: #111;
      background: #fafafa;
      margin-bottom: 14px;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="search"]:focus {
      outline: none;
      border-color: #000;
      background: #fff;
    }
    input::placeholder { color: #bbb; }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      padding: 15px 20px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      transition: opacity 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.3px;
      font-family: inherit;
    }
    .btn:active { transform: scale(0.98); opacity: 0.85; }

    .btn.white {
      background: #fff;
      color: #000;
      border: 1.5px solid #e0e0e0;
    }
    .btn.outline {
      background: transparent;
      border: 1.5px solid #000;
      color: #000;
    }
    .btn.ghost {
      background: transparent;
      border: 1.5px solid #ddd;
      color: #555;
    }
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    /* ── Stats ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat-card {
      background: #fff;
      border-radius: 14px;
      padding: 16px 10px;
      text-align: center;
      border: 1px solid #e8e8e8;
    }
    .stat-num {
      font-size: 26px;
      font-weight: 900;
      color: #000;
      line-height: 1;
      letter-spacing: -0.5px;
    }
    .stat-num.muted { color: #aaa; }
    .stat-lbl {
      font-size: 10px;
      color: #aaa;
      margin-top: 5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    /* ── Barcode preview ── */
    #barcode-preview {
      text-align: center;
      padding: 20px 14px 14px;
      border: 1.5px dashed #d0d0d0;
      border-radius: 12px;
      margin-top: 16px;
      background: #fafafa;
      display: none;
    }
    #barcode-preview svg { max-width: 100%; }
    .barcode-item-label {
      font-size: 13px;
      color: #111;
      margin-top: 10px;
      font-weight: 700;
    }
    .barcode-item-sub { font-size: 11px; color: #aaa; margin-top: 3px; }

    /* ── Inventory ── */
    .search-wrap { position: relative; margin-bottom: 16px; }
    .search-wrap input { margin: 0; padding-left: 42px; }
    .search-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
    }

    .item-card {
      background: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      border: 1px solid #e8e8e8;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .item-info h3 { font-size: 15px; font-weight: 800; color: #000; }
    .item-info .sub { font-size: 12px; color: #aaa; margin-top: 3px; font-weight: 500; }
    .item-info .cost { font-size: 12px; color: #666; margin-top: 3px; font-weight: 600; }
    .item-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 6px;
    }
    .badge-available { background: #000; color: #fff; }
    .badge-sold { background: #ececec; color: #888; }
    .item-barcode-mini { flex-shrink: 0; text-align: center; }
    .item-barcode-mini svg { width: 110px; height: 44px; }
    .item-barcode-mini .id-text { font-size: 9px; color: #ccc; margin-top: 2px; letter-spacing: 0.3px; }

    /* ── Scanner ── */
    #reader { border-radius: 12px; overflow: hidden; }
    #reader > * { border-radius: 12px; }
    .scanner-hint {
      text-align: center;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 14px;
      line-height: 1.5;
      font-weight: 500;
    }

    /* ── Sale form ── */
    .item-detail {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .item-detail:last-child { border: none; }
    .detail-key { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-val { font-size: 14px; font-weight: 700; color: #000; }

    /* ── Divider ── */
    .divider { height: 1px; background: #f0f0f0; margin: 18px 0; }

    /* ── Sales table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 1px solid #e8e8e8;
      -webkit-overflow-scrolling: touch;
    }
    table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
    th {
      background: #000; color: #fff;
      padding: 12px 14px; text-align: left;
      white-space: nowrap; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.8px;
      font-weight: 800;
    }
    td {
      padding: 12px 14px;
      border-bottom: 1px solid #f5f5f5;
      color: #333; white-space: nowrap;
      font-weight: 500;
    }
    tr:last-child td { border: none; }
    tr:nth-child(even) td { background: #fafafa; }
    .profit-cell { font-weight: 900; }
    .profit-pos { color: #000; }
    .profit-neg { color: #888; }

    /* ── Delete button ── */
    .btn-delete {
      background: none;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      color: #bbb;
      font-size: 16px;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-delete:active { background: #fee; border-color: #f88; color: #c00; }

    /* ── Import section ── */
    .import-area {
      border: 2px dashed #d8d8d8;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      margin-bottom: 14px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .import-area:hover { border-color: #000; background: #f8f8f8; }
    .import-area p { font-size: 13px; font-weight: 700; color: #888; margin-top: 6px; }
    .import-area small { font-size: 11px; color: #bbb; display: block; margin-top: 3px; font-weight: 500; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 50px 20px;
    }
    .empty-state .e-icon { font-size: 48px; margin-bottom: 14px; opacity: 0.2; }
    .empty-state p { font-size: 15px; font-weight: 700; color: #bbb; }
    .empty-state small { font-size: 13px; color: #ccc; margin-top: 4px; display: block; font-weight: 500; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: #111; color: #fff;
      padding: 13px 22px;
      border-radius: 100px; font-size: 13px;
      font-weight: 700; z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap; max-width: 90vw;
      box-shadow: 0 8px 30px rgba(0,0,0,0.18);
      letter-spacing: 0.1px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.toast-success { background: #111; }
    .toast.toast-error { background: #555; }

    @media (max-width: 380px) {
      .stat-num { font-size: 20px; }
      .stat-lbl { font-size: 9px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">SBSL</div>
</header>

<nav class="tabs">
  <button class="tab-btn active" onclick="showTab('inventory', this)">
    <span class="icon">📦</span>Inventory
  </button>
  <button class="tab-btn" onclick="showTab('add', this)">
    <span class="icon">＋</span>Add Item
  </button>
  <button class="tab-btn" onclick="showTab('sell', this)">
    <span class="icon">📷</span>Sell
  </button>
  <button class="tab-btn" onclick="showTab('sales', this)">
    <span class="icon">📊</span>Sales Log
  </button>
</nav>

<div class="content">

  <!-- ═══ INVENTORY ═══ -->
  <div id="tab-inventory" class="tab-content active">
    <h2 class="section-title">Inventory</h2>
    <div id="inv-stats" class="stats-row"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
      <button class="btn white" onclick="printBarcodeSheet()">🖨 Print Sheet</button>
      <button class="btn white" onclick="document.getElementById('import-file').click()">📥 Import Excel</button>
    </div>
    <input type="file" id="import-file" accept=".xlsx,.xls,.csv" style="display:none;" onchange="importFromExcel(this)">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" placeholder="Search name, brand, size…" oninput="renderInventory(this.value)">
    </div>
    <div id="inventory-list"></div>
  </div>

  <!-- ═══ ADD ITEM ═══ -->
  <div id="tab-add" class="tab-content">
    <h2 class="section-title">Add New Item</h2>
    <div class="card">
      <div class="card-title">Item Details</div>

      <label>Item Name / Description</label>
      <input type="text" id="item-name" placeholder="e.g. Blue Denim Jacket">

      <label>Brand <span style="font-weight:500;color:#bbb;text-transform:none;font-size:11px;">(optional)</span></label>
      <input type="text" id="item-brand" placeholder="e.g. Levi's, Nike, Zara">

      <label>Size</label>
      <input type="text" id="item-size" placeholder="e.g. S, M, L, XL, 32W">

      <label>Original Cost (what you paid) $</label>
      <input type="number" id="item-cost" placeholder="0.00" step="0.01" min="0">

      <button class="btn" onclick="addItem()">Generate Barcode</button>

      <div id="barcode-preview">
        <div id="barcode-svg-wrap"></div>
        <div class="barcode-item-label" id="barcode-item-label"></div>
        <div class="barcode-item-sub" id="barcode-item-sub"></div>
        <div class="btn-row">
          <button class="btn" onclick="printBarcode()">🖨 Print Tag</button>
          <button class="btn outline" onclick="downloadBarcode()">↓ Save Image</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ SELL ═══ -->
  <div id="tab-sell" class="tab-content">
    <h2 class="section-title">Scan to Sell</h2>

    <div class="card" id="scanner-card">
      <p class="scanner-hint">Point your camera at the barcode on the clothing tag</p>
      <div id="reader"></div>
      <div style="margin-top:12px;">
        <button class="btn" id="scan-btn" onclick="toggleScanner()">Start Camera</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Or enter barcode manually</div>
      <div style="display:flex; gap:10px; align-items:flex-start;">
        <input type="text" id="manual-code" placeholder="SBSL-XXXXXX"
               style="margin:0; flex:1;"
               onkeydown="if(event.key==='Enter') lookupCode(this.value)">
        <button class="btn" style="width:auto; padding:13px 20px; margin:0; flex-shrink:0;"
                onclick="lookupCode(document.getElementById('manual-code').value)">Go</button>
      </div>
    </div>

    <div class="card" id="sale-card" style="display:none;">
      <div class="card-title" style="color:#000;">Item Found</div>
      <div id="found-item-details"></div>
      <div class="divider"></div>
      <label>Buyer Name</label>
      <input type="text" id="buyer-name" placeholder="Customer's name">
      <label>Sale Price $</label>
      <input type="number" id="sale-price" placeholder="0.00" step="0.01" min="0">
      <button class="btn" onclick="completeSale()" style="margin-bottom:10px;">Complete Sale</button>
      <button class="btn ghost" onclick="cancelSale()">Cancel</button>
    </div>
  </div>

  <!-- ═══ SALES LOG ═══ -->
  <div id="tab-sales" class="tab-content">
    <h2 class="section-title">Sales Log</h2>
    <div id="sales-stats" class="stats-row"></div>
    <button class="btn" style="margin-bottom:16px;" onclick="exportExcel()">Export to Excel</button>
    <div id="sales-content"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──
const DB_ITEMS = 'sbsl_items';
const DB_SALES = 'sbsl_sales';

function getItems() { return JSON.parse(localStorage.getItem(DB_ITEMS) || '[]'); }
function saveItems(d) { localStorage.setItem(DB_ITEMS, JSON.stringify(d)); }
function getSales() { return JSON.parse(localStorage.getItem(DB_SALES) || '[]'); }
function saveSales(d) { localStorage.setItem(DB_SALES, JSON.stringify(d)); }

function genId() {
  const c = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let r = 'SBSL-';
  for (let i = 0; i < 6; i++) r += c[Math.floor(Math.random() * c.length)];
  return r;
}
function fmtMoney(n) { return '$' + Number(n || 0).toFixed(2); }
function fmtDate(iso) {
  const d = new Date(iso);
  return (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
}
function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TABS ──
let activeTab = 'inventory';

function showTab(name, btn) {
  if (activeTab === 'sell' && name !== 'sell') stopScanner();
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  activeTab = name;
  if (name === 'inventory') renderInventory();
  if (name === 'sales') renderSales();
  if (name === 'sell') {
    document.getElementById('sale-card').style.display = 'none';
    document.getElementById('manual-code').value = '';
  }
}

// ── ADD ITEM ──
let lastItem = null;

function addItem() {
  const name  = document.getElementById('item-name').value.trim();
  const brand = document.getElementById('item-brand').value.trim();
  const size  = document.getElementById('item-size').value.trim();
  const cost  = parseFloat(document.getElementById('item-cost').value) || 0;
  if (!name) { toast('Please enter an item name', 'error'); return; }

  const item = { id: genId(), name, brand, size, cost, createdAt: new Date().toISOString(), sold: false };
  const items = getItems(); items.push(item); saveItems(items);
  lastItem = item;

  const wrap = document.getElementById('barcode-svg-wrap');
  wrap.innerHTML = '<svg id="gen-bc"></svg>';
  const displayName = item.name.length > 28 ? item.name.substring(0,26) + '…' : item.name;
  JsBarcode('#gen-bc', item.id, { format:'CODE128', width:2, height:60, displayValue:true, text: displayName, fontSize:13, font:'Inter,sans-serif', margin:10, background:'#fafafa', lineColor:'#000' });

  document.getElementById('barcode-item-label').textContent =
    item.name + (item.brand ? '  ·  ' + item.brand : '') + (item.size ? '  ·  Size ' + item.size : '');
  document.getElementById('barcode-item-sub').textContent =
    'ID: ' + item.id + '   Cost: ' + fmtMoney(item.cost);

  document.getElementById('barcode-preview').style.display = 'block';
  ['item-name','item-brand','item-size','item-cost'].forEach(id => document.getElementById(id).value = '');
  toast('Item saved — print or download the tag', 'success');
}

function printBarcode() {
  if (!lastItem) return;
  const svgHTML = document.getElementById('gen-bc').outerHTML;
  const w = window.open('', '_blank', 'width=420,height=380');
  w.document.write(`<!DOCTYPE html><html><head>
    <title>Tag – ${lastItem.id}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;900&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin:0; padding:0; }
      body { font-family:'Inter',sans-serif; background:#fff; padding:28px; text-align:center; color:#000; }
      .tag-box { border: 1.5px solid #ddd; border-radius:14px; padding:20px 24px; display:inline-block; min-width:240px; }
      h2 { font-size:15px; font-weight:900; margin-bottom:3px; }
      .meta { font-size:12px; color:#aaa; font-weight:500; margin-bottom:14px; }
      svg { max-width:230px; display:block; margin: 0 auto; }
      .id-num { font-size:10px; color:#ccc; margin-top:6px; letter-spacing:0.5px; }
      .print-btn { margin-top:20px; padding:11px 28px; background:#000; color:#fff; border:none;
        border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; }
      @media print { .print-btn { display:none; } }
    </style>
  </head><body>
    <div class="tag-box">
      <h2>${escHtml(lastItem.name)}</h2>
      <div class="meta">${escHtml(lastItem.brand || '')}${lastItem.size ? ' · Size ' + escHtml(lastItem.size) : ''}</div>
      ${svgHTML}
      <div class="id-num">${lastItem.id}</div>
    </div>
    <br>
    <button class="print-btn" onclick="window.print()">Print Tag</button>
  </body></html>`);
  w.document.close();
}

function downloadBarcode() {
  if (!lastItem) return;
  const svgEl = document.getElementById('gen-bc');
  const svgData = new XMLSerializer().serializeToString(svgEl);
  const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth || 300;
    canvas.height = img.naturalHeight || 100;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#fafafa';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = 'barcode-' + lastItem.id + '.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
    toast('Image saved!', 'success');
  };
  img.onerror = () => {
    const a = document.createElement('a');
    a.download = 'barcode-' + lastItem.id + '.svg';
    a.href = url;
    a.click();
  };
  img.src = url;
}

// ── INVENTORY ──
function renderInventory(search = '') {
  const items = getItems();
  const sold  = items.filter(i => i.sold).length;
  const avail = items.length - sold;

  document.getElementById('inv-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${items.length}</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${avail}</div>
      <div class="stat-lbl">Available</div>
    </div>
    <div class="stat-card">
      <div class="stat-num muted">${sold}</div>
      <div class="stat-lbl">Sold</div>
    </div>
  `;

  const q = search.toLowerCase();
  const filtered = [...items].reverse().filter(i =>
    !q ||
    i.name.toLowerCase().includes(q) ||
    (i.brand||'').toLowerCase().includes(q) ||
    (i.size||'').toLowerCase().includes(q) ||
    i.id.toLowerCase().includes(q)
  );

  const list = document.getElementById('inventory-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <div class="e-icon">${search ? '🔍' : '📦'}</div>
      <p>${search ? 'No results for "' + escHtml(search) + '"' : 'No items yet'}</p>
      <small>${search ? '' : 'Tap Add Item to get started'}</small>
    </div>`;
    return;
  }

  list.innerHTML = '';
  filtered.forEach(item => {
    const svgId = 'bc_' + item.id.replace(/-/g,'');
    const div = document.createElement('div');
    div.className = 'item-card';
    div.innerHTML = `
      <div class="item-info" style="flex:1;min-width:0;">
        <h3>${escHtml(item.name)}</h3>
        <div class="sub">${item.brand ? escHtml(item.brand) : '—'}${item.size ? ' · Size ' + escHtml(item.size) : ''}</div>
        <div class="cost">Cost: ${fmtMoney(item.cost)}</div>
        <span class="item-badge ${item.sold ? 'badge-sold' : 'badge-available'}">${item.sold ? 'Sold' : 'Available'}</span>
      </div>
      <div class="item-barcode-mini">
        <svg id="${svgId}"></svg>
        <div class="id-text">${item.id}</div>
      </div>
      <button class="btn-delete" onclick="deleteItem('${item.id}')" title="Delete item">✕</button>
    `;
    list.appendChild(div);
    try {
      JsBarcode('#' + svgId, item.id, { format:'CODE128', width:1.3, height:38, displayValue:false, margin:3, background:'#fff', lineColor:'#000' });
    } catch(e) {}
  });
}

// ── SCANNER ──
let scanner = null;
let scannerRunning = false;
let scannedItem = null;

function toggleScanner() {
  scannerRunning ? stopScanner() : startScanner();
}

function startScanner() {
  const btn = document.getElementById('scan-btn');
  btn.textContent = 'Starting camera…';
  btn.disabled = true;

  let cfg = {};
  try {
    if (typeof Html5QrcodeSupportedFormats !== 'undefined') {
      cfg = { formatsToSupport: [
        Html5QrcodeSupportedFormats.CODE_128,
        Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.EAN_13,
        Html5QrcodeSupportedFormats.QR_CODE
      ]};
    }
  } catch(e) {}

  scanner = new Html5Qrcode('reader', cfg);
  scanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 260, height: 100 } },
    code => { stopScanner(); lookupCode(code.trim()); },
    () => {}
  ).then(() => {
    scannerRunning = true;
    btn.textContent = 'Stop Camera';
    btn.disabled = false;
    btn.className = 'btn ghost';
  }).catch(() => {
    btn.textContent = 'Start Camera';
    btn.disabled = false;
    btn.className = 'btn';
    toast('Camera unavailable — use manual entry', 'error');
  });
}

function stopScanner() {
  if (scanner && scannerRunning) {
    scanner.stop().then(() => {
      scannerRunning = false;
      const btn = document.getElementById('scan-btn');
      if (btn) { btn.textContent = 'Start Camera'; btn.className = 'btn'; }
    }).catch(() => {});
  }
}

// ── LOOKUP & SALE ──
function lookupCode(code) {
  code = (code || '').trim();
  if (!code) { toast('Enter or scan a barcode first', 'error'); return; }
  const item = getItems().find(i => i.id === code);
  if (!item) { toast('Item not found: ' + code, 'error'); return; }
  if (item.sold) { toast('This item has already been sold', 'error'); return; }

  scannedItem = item;
  document.getElementById('found-item-details').innerHTML = `
    <div class="item-detail"><span class="detail-key">Item</span><span class="detail-val">${escHtml(item.name)}</span></div>
    <div class="item-detail"><span class="detail-key">Brand</span><span class="detail-val">${escHtml(item.brand || '—')}</span></div>
    <div class="item-detail"><span class="detail-key">Size</span><span class="detail-val">${escHtml(item.size || '—')}</span></div>
    <div class="item-detail"><span class="detail-key">Your Cost</span><span class="detail-val">${fmtMoney(item.cost)}</span></div>
    <div class="item-detail"><span class="detail-key">ID</span><span class="detail-val" style="font-size:12px;">${item.id}</span></div>
  `;
  document.getElementById('buyer-name').value = '';
  document.getElementById('sale-price').value = '';
  const card = document.getElementById('sale-card');
  card.style.display = 'block';
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function completeSale() {
  if (!scannedItem) return;
  const buyer = document.getElementById('buyer-name').value.trim();
  const price = parseFloat(document.getElementById('sale-price').value);
  if (!buyer)           { toast('Please enter the buyer name', 'error'); return; }
  if (isNaN(price)||price<0) { toast('Please enter a valid sale price', 'error'); return; }

  const sale = {
    id: 'SALE-' + Date.now(),
    itemId: scannedItem.id, itemName: scannedItem.name,
    brand: scannedItem.brand || '', size: scannedItem.size || '',
    cost: scannedItem.cost || 0, salePrice: price,
    buyer, soldAt: new Date().toISOString()
  };

  const items = getItems();
  const idx = items.findIndex(i => i.id === scannedItem.id);
  if (idx !== -1) { items[idx].sold = true; saveItems(items); }

  const sales = getSales(); sales.push(sale); saveSales(sales);

  document.getElementById('sale-card').style.display = 'none';
  document.getElementById('manual-code').value = '';
  scannedItem = null;

  toast('Sale recorded  ·  Profit: ' + fmtMoney(price - sale.cost), 'success');
}

function cancelSale() {
  scannedItem = null;
  document.getElementById('sale-card').style.display = 'none';
  document.getElementById('manual-code').value = '';
}

// ── SALES LOG ──
function renderSales() {
  const sales = getSales();
  const revenue = sales.reduce((s,x) => s + x.salePrice, 0);
  const cost    = sales.reduce((s,x) => s + (x.cost||0), 0);
  const profit  = revenue - cost;

  document.getElementById('sales-stats').innerHTML = `
    <div class="stat-card">
      <div class="stat-num">${sales.length}</div>
      <div class="stat-lbl">Sales</div>
    </div>
    <div class="stat-card">
      <div class="stat-num">${fmtMoney(revenue)}</div>
      <div class="stat-lbl">Revenue</div>
    </div>
    <div class="stat-card">
      <div class="stat-num ${profit < 0 ? 'muted' : ''}">${fmtMoney(profit)}</div>
      <div class="stat-lbl">Profit</div>
    </div>
  `;

  const container = document.getElementById('sales-content');
  if (sales.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="e-icon">📊</div>
      <p>No sales recorded yet</p>
      <small>Scan a tag in the Sell tab to log your first sale</small>
    </div>`;
    return;
  }

  const rows = [...sales].reverse().map(s => {
    const p = s.salePrice - (s.cost||0);
    return `<tr>
      <td>${fmtDate(s.soldAt)}</td>
      <td><strong>${escHtml(s.itemName)}</strong><br>
          <span style="color:#aaa;font-size:11px;">${escHtml(s.brand)}</span></td>
      <td>${escHtml(s.size||'—')}</td>
      <td>${escHtml(s.buyer)}</td>
      <td>${fmtMoney(s.cost)}</td>
      <td>${fmtMoney(s.salePrice)}</td>
      <td class="profit-cell ${p>=0?'profit-pos':'profit-neg'}">${fmtMoney(p)}</td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Date</th><th>Item</th><th>Size</th><th>Buyer</th>
          <th>Cost</th><th>Sold For</th><th>Profit</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

// ── EXCEL EXPORT ──
function exportExcel() {
  const sales = getSales();
  if (!sales.length) { toast('No sales to export yet', 'error'); return; }
  const hdr = ['Date Sold','Item Name','Brand','Size','Original Cost','Sale Price','Profit','Buyer','Item ID','Sale ID'];
  const rows = sales.map(s => {
    const p = s.salePrice - (s.cost||0);
    return [fmtDate(s.soldAt),s.itemName,s.brand||'',s.size||'',s.cost||0,s.salePrice,p,s.buyer,s.itemId,s.id];
  });
  const ws = XLSX.utils.aoa_to_sheet([hdr,...rows]);
  ws['!cols'] = [{wch:12},{wch:26},{wch:15},{wch:8},{wch:14},{wch:12},{wch:10},{wch:22},{wch:14},{wch:18}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Sales Log');
  const d = new Date();
  XLSX.writeFile(wb, 'SBSL_Sales_' + (d.getMonth()+1) + '-' + d.getDate() + '-' + d.getFullYear() + '.xlsx');
  toast('Excel file downloaded!', 'success');
}

// ── 4×6 BARCODE SHEET ──
function printBarcodeSheet() {
  const items = getItems().filter(i => !i.sold);
  if (items.length === 0) { toast('No available items to print', 'error'); return; }

  // Build barcode SVGs in memory (2 cols × 4 rows = 8 per sheet)
  // We generate SVG strings for each item using a temp container
  const tmp = document.createElement('div');
  tmp.style.cssText = 'position:fixed;left:-9999px;top:0;';
  document.body.appendChild(tmp);

  const svgStrings = items.map(item => {
    const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    const id = 'tmp_' + item.id.replace(/-/g,'');
    svg.id = id;
    tmp.appendChild(svg);
    const displayName = item.name.length > 22 ? item.name.substring(0,20) + '…' : item.name;
    try {
      JsBarcode('#'+id, item.id, {
        format:'CODE128', width:1.6, height:46,
        displayValue:true, text: displayName,
        fontSize:11, font:'Arial,sans-serif',
        margin:6, background:'#fff', lineColor:'#000'
      });
    } catch(e) {}
    return { svg: svg.outerHTML, item };
  });

  document.body.removeChild(tmp);

  // Build print HTML — 4×6 in, 2 cols × 4 rows grid
  const cells = svgStrings.map(({svg, item}) => `
    <div class="bc-cell">
      <div class="bc-name">${escHtml(item.name)}</div>
      <div class="bc-meta">${escHtml(item.brand||'')}${item.size?' · Sz '+escHtml(item.size):''}</div>
      ${svg}
      <div class="bc-id">${item.id}</div>
    </div>
  `).join('');

  const w = window.open('', '_blank', 'width=480,height=700');
  w.document.write(`<!DOCTYPE html><html><head>
    <title>Barcode Sheet</title>
    <style>
      @page { size: 4in 6in; margin: 0.12in; }
      * { box-sizing: border-box; margin:0; padding:0; }
      body { font-family: Arial, sans-serif; width:4in; height:6in; overflow:hidden; }
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: repeat(4, 1fr);
        gap: 0;
        width: 100%;
        height: 100%;
      }
      .bc-cell {
        border: 1px solid #000;
        padding: 4px 6px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .bc-name {
        font-size: 9pt;
        font-weight: 900;
        text-align: center;
        line-height: 1.1;
        margin-bottom: 1px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      .bc-meta {
        font-size: 7pt;
        color: #666;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 100%;
      }
      .bc-cell svg { max-width: 100%; height: auto; }
      .bc-id { font-size: 6pt; color: #bbb; margin-top: 1px; letter-spacing: 0.3px; }
      .print-btn {
        display: block; margin: 12px auto; padding: 10px 28px;
        background: #000; color: #fff; border: none; border-radius: 8px;
        font-size: 14px; font-weight: 700; cursor: pointer;
      }
      @media print { .print-btn { display:none; } }
    </style>
  </head><body>
    <div class="grid">${cells}</div>
    <button class="print-btn" onclick="window.print()">Print Sheet</button>
  </body></html>`);
  w.document.close();
}

// ── DELETE ITEM ──
function deleteItem(id) {
  const items = getItems();
  const item = items.find(i => i.id === id);
  if (!item) return;
  const label = item.name + (item.sold ? ' (Sold)' : '');
  if (!confirm('Delete "' + label + '"?\n\nThis cannot be undone.')) return;
  saveItems(items.filter(i => i.id !== id));
  toast('Item deleted', 'success');
  renderInventory(document.querySelector('#tab-inventory input[type="search"]')?.value || '');
}

// ── IMPORT FROM EXCEL ──
function importFromExcel(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = ''; // reset so same file can be picked again

  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

      if (!rows.length) { toast('No data found in file', 'error'); return; }

      // Flexible column matching (case-insensitive)
      const colMap = {};
      const keys = Object.keys(rows[0]);
      keys.forEach(k => {
        const kl = k.toLowerCase().replace(/[\s_\-]/g, '');
        if (!colMap.name   && /name|item|description|desc/.test(kl))  colMap.name  = k;
        if (!colMap.brand  && /brand|make|designer|label/.test(kl))   colMap.brand = k;
        if (!colMap.size   && /size|sz/.test(kl))                      colMap.size  = k;
        if (!colMap.cost   && /cost|price|paid|purchase/.test(kl))     colMap.cost  = k;
      });

      if (!colMap.name) {
        toast('No "Name" column found in your file', 'error');
        return;
      }

      const existing = getItems();
      let added = 0, skipped = 0;

      rows.forEach(row => {
        const name = String(row[colMap.name] || '').trim();
        if (!name) { skipped++; return; }

        const item = {
          id: genId(),
          name,
          brand: colMap.brand ? String(row[colMap.brand] || '').trim() : '',
          size:  colMap.size  ? String(row[colMap.size]  || '').trim() : '',
          cost:  colMap.cost  ? parseFloat(row[colMap.cost]) || 0 : 0,
          createdAt: new Date().toISOString(),
          sold: false
        };
        existing.push(item);
        added++;
      });

      saveItems(existing);
      renderInventory();
      toast(`Imported ${added} item${added !== 1 ? 's' : ''}${skipped ? ' · ' + skipped + ' skipped' : ''}`, 'success');
    } catch(err) {
      toast('Error reading file — check format', 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

// ── TOAST ──
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type==='error' ? ' toast-error' : ' toast-success');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className='toast', 3200);
}

// ── INIT ──
renderInventory();
</script>
